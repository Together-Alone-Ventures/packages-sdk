# Demo OffSign — Postgres, MySQL, MongoDB (ports dédiés pour éviter conflit avec backend:5432)
# Usage: cd packages-sdk/demo && docker compose up -d && npm run db:seed

services:
  demo-postgres:
    image: postgres:16-alpine
    container_name: offsign-demo-postgres
    environment:
      POSTGRES_USER: offsign
      POSTGRES_PASSWORD: offsign
      POSTGRES_DB: meridian_prod
    ports:
      - "${DEMO_POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U offsign -d meridian_prod']
      interval: 3s
      timeout: 5s
      retries: 12

  demo-mysql:
    image: mysql:8.4
    container_name: offsign-demo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: offsign
      MYSQL_DATABASE: meridian_platform
      MYSQL_USER: offsign
      MYSQL_PASSWORD: offsign
    ports:
      - "${DEMO_MYSQL_PORT:-3307}:3306"
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uoffsign', '-poffsign']
      interval: 5s
      timeout: 5s
      retries: 15

  demo-mongo:
    image: mongo:7
    container_name: offsign-demo-mongo
    ports:
      - "${DEMO_MONGO_PORT:-27018}:27017"
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 12
